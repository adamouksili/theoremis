name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Performance budgets
        if: matrix.node-version == 20
        run: npm run perf:ci

      - name: Upload perf artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-node20
          path: bench/artifacts/perf-report.json
          if-no-files-found: error

      - name: Size budgets
        run: npm run size:check

      - name: Run benchmark
        if: matrix.node-version == 20
        run: npm run bench

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check types
        run: npx tsc --noEmit

      - name: Verify build output
        run: |
          npm run build
          npm run size:check
          test -f dist/index.html || (echo "Missing dist/index.html" && exit 1)
          echo "Build output verified"
